name: CI (.NET + React)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

env:
  DOTNET_VERSION: "8.0.x"
  NODE_VERSION: "20"
  # DÜZELT: Repo içindeki gerçek yollar
  BACKEND_PATH: "CarGallery-master/CarGallery - Backend"
  FRONTEND_PATH: "CarGallery-master/CarGallery-Frontend"

jobs:
  backend:
    name: Backend - build (and test if exists)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        working-directory: ${{ env.BACKEND_PATH }}
        run: dotnet restore

      - name: Build
        working-directory: ${{ env.BACKEND_PATH }}
        run: dotnet build -c Release --no-restore

      - name: Test (skip if none)
        working-directory: ${{ env.BACKEND_PATH }}
        run: |
          if ls **/*Tests*.csproj 1> /dev/null 2>&1; then
            dotnet test -c Release --no-build
          else
            echo "No test project found, skipping dotnet test."
          fi

  frontend:
    name: Frontend - build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: ${{ env.FRONTEND_PATH }}/package-lock.json

      - name: Install
        working-directory: ${{ env.FRONTEND_PATH }}
        run: npm ci

      - name: Build
        working-directory: ${{ env.FRONTEND_PATH }}
        run: npm run build
